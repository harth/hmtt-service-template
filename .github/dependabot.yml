version: 2

updates:
  # ── Gradle dependencies ───────────────────────────────────────────────────
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    labels:
      - "dependencies"
      - "gradle"
    open-pull-requests-limit: 10

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
